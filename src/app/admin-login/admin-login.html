<div class="login-page">
  <div class="login-container">
    <a routerLink="/" class="back-link">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round" />
      </svg>
      Back to Guide
    </a>

    <div class="login-card glass-panel">
      <div class="login-header">
        <div class="login-icon">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="11" width="18" height="11" rx="2" stroke="url(#lockGrad)" stroke-width="2" />
            <path d="M7 11V7a5 5 0 0110 0v4" stroke="url(#lockGrad)" stroke-width="2" stroke-linecap="round" />
            <defs>
              <linearGradient id="lockGrad" x1="3" y1="7" x2="21" y2="22">
                <stop stop-color="#c084fc" />
                <stop offset="1" stop-color="#9a4edb" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1>Admin <span class="text-gradient-purple">Access</span></h1>
      </div>

      <form (ngSubmit)="login()" class="login-form">
        <div class="form-field">
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="admin@ideea.network"
            required
            autocomplete="email"
          />
        </div>
        <div class="form-field">
          <label for="password">Password</label>
          <input
            id="password"
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            required
            autocomplete="current-password"
          />
        </div>

        @if (error) {
          <div class="login-error">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="10" stroke="#ef4444" stroke-width="2" />
              <line x1="12" y1="8" x2="12" y2="12" stroke="#ef4444" stroke-width="2" stroke-linecap="round" />
              <line x1="12" y1="16" x2="12.01" y2="16" stroke="#ef4444" stroke-width="2" stroke-linecap="round" />
            </svg>
            {{ error }}
          </div>
        }

        <button type="submit" class="btn-primary btn-login" [disabled]="loading || !email || !password">
          @if (loading) {
            <span class="spinner"></span>
            Signing in...
          } @else {
            Sign In
          }
        </button>
      </form>
    </div>
  </div>
</div>
